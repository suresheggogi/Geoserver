name: Sync Shapefiles to Remote Server

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "Host remote" >> ~/.ssh/config
          echo "  HostName ${{ secrets.SSH_HOST }}" >> ~/.ssh/config
          echo "  User ${{ secrets.SSH_USER }}" >> ~/.ssh/config
          echo "  Port 22222" >> ~/.ssh/config
          echo "  StrictHostKeyChecking accept-new" >> ~/.ssh/config

      - name: Test SSH connection
        run: ssh remote "echo 'SSH OK' && ls -d /opt/geoserver/shapefiles" || echo "REMOTE_DIR_MISSING"

      - name: Sync shapefiles to remote server
        run: |
          rsync -avz --delete -e ssh ./shapefiles/ remote:/opt/geoserver/shapefiles/

services:
  - type: web
    name: geoserver
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /geoserver/rest/about/version.json
    disk:
      name: geoserver-data
      mountPath: /opt/geoserver_data
      sizeGB: 1
    envVars:
      - key: GEOSERVER_ADMIN_USER
        value: admin
      - key: GEOSERVER_ADMIN_PASSWORD
        value: testing123
      - key: RENDER_EXTERNAL_URL
        sync: false
      - key: JAVA_OPTS
        value: "-Xms256m -Xmx512m -XX:+UseContainerSupport"
      - key: POSTGIS_HOST
        value: dpg-d812l83rjlhs73aq9fd0-a
      - key: POSTGIS_PORT
        value: "5432"
      - key: POSTGIS_DB
        value: geoserver_ot30
      - key: POSTGIS_USER
        value: geoserver_ot30_user
      - key: POSTGIS_PASSWORD
        value: b7dBqprFdW7WBCnL0z1MTvXirSYJ0mZG
      - key: POSTGIS_SCHEMA
        value: public
      - key: GEOSERVER_WORKSPACE
        value: myworkspace

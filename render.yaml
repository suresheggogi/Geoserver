services:
  - type: web
    name: geoserver
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    region: oregon

    disk:
      name: geoserver-data
      mountPath: /opt/geoserver/data
      sizeMB: 100

    envVars:
      - key: GEOSERVER_ADMIN_USER
        value: admin
      - key: GEOSERVER_ADMIN_PASSWORD
        value: RLzoieV1g6cJYmi5ZUvLuVK9rxhLdCqm

      - key: PG_HOST
        value: dpg-d82buslckfvc73f7m3j0-a
      - key: PG_PORT
        value: "5432"
      - key: PG_DATABASE
        value: geodb_0hyd
      - key: PG_USER
        value: geodb_0hyd_user
      - key: PG_PASSWORD                  
        value: RLzoieV1g6cJYmi5ZUvLuVK9rxhLdCqm

      # Service is on free plan (512MB). GeoServer needs more metaspace for
      # class loading (hundreds of JARs), so reduce heap to compensate:
      #   heap=96m | metaspace=96m | classspace=24m | codecache=48m | Xss256k
      # Total est: ~96+96+24+48+50(overhead)+30(OS)=344m ✓
      # Both JAVA_OPTS and CATALINA_OPTS (= $EXTRA_JAVA_OPTS) are passed to JVM.
      - key: EXTRA_JAVA_OPTS
        value: >-
          -Xms64m
          -Xmx96m
          -XX:+UseSerialGC
          -Xss256k
          -XX:ReservedCodeCacheSize=48m

      - key: JAVA_OPTS
        value: >-
          -Xms64m
          -Xmx96m
          -XX:+UseSerialGC
          -Xss256k
          -XX:ReservedCodeCacheSize=48m
          -XX:MaxMetaspaceSize=96m
          -XX:CompressedClassSpaceSize=24m
          -Djava.awt.headless=true
          -Dfile.encoding=UTF-8
          -DGEOSERVER_CSRF_DISABLED=true
      - key: GEOSERVER_DATA_DIR
        value: /opt/geoserver/data
      - key: GEOWEBCACHE_CACHE_DIR
        value: /opt/geoserver/data/gwc

databases:
  - name: geodb
    databaseName: geodb_0hyd
    user: geodb_0hyd_user
    region: oregon
    plan: free

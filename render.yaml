services:
  - type: web
    name: geoserver
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    region: oregon

    disk:
      name: geoserver-data
      mountPath: /opt/geoserver/data
      sizeMB: 100

    envVars:
      - key: GEOSERVER_ADMIN_USER
        value: admin
      - key: GEOSERVER_ADMIN_PASSWORD
        value: RLzoieV1g6cJYmi5ZUvLuVK9rxhLdCqm

      - key: PG_HOST
        value: dpg-d82buslckfvc73f7m3j0-a
      - key: PG_PORT
        value: "5432"
      - key: PG_DATABASE
        value: geodb_0hyd
      - key: PG_USER
        value: geodb_0hyd_user
      - key: PG_PASSWORD                  
        value: RLzoieV1g6cJYmi5ZUvLuVK9rxhLdCqm

      
      - key: GEOSERVER_DATA_DIR
        value: /opt/geoserver/data
      - key: GEOWEBCACHE_CACHE_DIR
        value: /opt/geoserver/data/gwc

databases:
  - name: geodb
    databaseName: geodb_0hyd
    user: geodb_0hyd_user
    region: oregon
    plan: free

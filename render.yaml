services:
  - type: web
    name: geoserver
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    region: oregon

    disk:
      name: geoserver-data
      mountPath: /opt/geoserver/data
      sizeMB: 100

    envVars:
      - key: GEOSERVER_ADMIN_USER
        value: admin
      - key: GEOSERVER_ADMIN_PASSWORD
        value: RLzoieV1g6cJYmi5ZUvLuVK9rxhLdCqm

      - key: PG_HOST
        value: dpg-d82buslckfvc73f7m3j0-a
      - key: PG_PORT
        value: "5432"
      - key: PG_DATABASE
        value: geodb_0hyd
      - key: PG_USER
        value: geodb_0hyd_user
      - key: PG_PASSWORD                  
        value: RLzoieV1g6cJYmi5ZUvLuVK9rxhLdCqm

      # Service is on free plan (512MB). GeoServer is memory-heavy, so we
      # must aggressively trim:  heap=160m | metaspace=48m | classspace=16m |
      # codecache=64m | threadstack=256k | SerialGC (lower overhead than G1).
      # Both JAVA_OPTS and CATALINA_OPTS (= $EXTRA_JAVA_OPTS) are passed to JVM.
      - key: EXTRA_JAVA_OPTS
        value: >-
          -Xms96m
          -Xmx160m
          -XX:+UseSerialGC
          -XX:MaxGCPauseMillis=500
          -Xss256k
          -XX:ReservedCodeCacheSize=64m

      - key: JAVA_OPTS
        value: >-
          -Xms96m
          -Xmx160m
          -XX:+UseSerialGC
          -XX:MaxGCPauseMillis=500
          -Xss256k
          -XX:ReservedCodeCacheSize=64m
          -XX:MaxMetaspaceSize=48m
          -XX:CompressedClassSpaceSize=16m
          -Djava.awt.headless=true
          -Dfile.encoding=UTF-8
          -DGEOSERVER_CSRF_DISABLED=true
      - key: GEOSERVER_DATA_DIR
        value: /opt/geoserver/data
      - key: GEOWEBCACHE_CACHE_DIR
        value: /opt/geoserver/data/gwc

databases:
  - name: geodb
    databaseName: geodb_0hyd
    user: geodb_0hyd_user
    region: oregon
    plan: free

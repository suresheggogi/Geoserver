services:
  - type: web
    name: geoserver
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    region: oregon

    disk:
      name: geoserver-data
      mountPath: /opt/geoserver/data
      sizeMB: 100

    envVars:
      - key: GEOSERVER_ADMIN_USER
        value: admin
      - key: GEOSERVER_ADMIN_PASSWORD
        value: RLzoieV1g6cJYmi5ZUvLuVK9rxhLdCqm

      - key: PG_HOST
        value: dpg-d82buslckfvc73f7m3j0-a
      - key: PG_PORT
        value: "5432"
      - key: PG_DATABASE
        value: geodb_0hyd
      - key: PG_USER
        value: geodb_0hyd_user
      - key: PG_PASSWORD                  
        value: RLzoieV1g6cJYmi5ZUvLuVK9rxhLdCqm

      # Override base image's EXTRA_JAVA_OPTS (-Xms256m -Xmx1g) — 1GB heap
      # would OOM the 512MB starter plan. Need to balance heap vs. non-heap:
      #   heap=320m | metaspace=80m | classspace=32m | JVM overhead ~50m | OS ~30m
      # Both JAVA_OPTS and CATALINA_OPTS (= $EXTRA_JAVA_OPTS) are passed to JVM;
      # the last -Xmx flag wins, so both must agree.
      - key: EXTRA_JAVA_OPTS
        value: >-
          -Xms128m
          -Xmx320m
          -XX:+UseG1GC
          -XX:MaxGCPauseMillis=200
          -XX:+UseStringDeduplication

      - key: JAVA_OPTS
        value: >-
          -Xms128m
          -Xmx320m
          -XX:+UseG1GC
          -XX:MaxGCPauseMillis=200
          -XX:+UseStringDeduplication
          -XX:MaxMetaspaceSize=80m
          -XX:CompressedClassSpaceSize=32m
          -Djava.awt.headless=true
          -Dfile.encoding=UTF-8
          -DGEOSERVER_CSRF_DISABLED=true
      - key: GEOSERVER_DATA_DIR
        value: /opt/geoserver/data
      - key: GEOWEBCACHE_CACHE_DIR
        value: /opt/geoserver/data/gwc

databases:
  - name: geodb
    databaseName: geodb_0hyd
    user: geodb_0hyd_user
    region: oregon
    plan: free
